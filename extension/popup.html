<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>ECHO AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="shell">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 40 40" fill="none">
                        <path d="M20 2 L4 10 L4 22 C4 31 11 38 20 40 C29 38 36 31 36 22 L36 10 Z" fill="#0f1419"
                            stroke="rgba(0,255,180,0.35)" stroke-width="1" />
                        <path d="M20 8 L8 15 L8 22 C8 29 13 34 20 36 C27 34 32 29 32 22 L32 15 Z" fill="none"
                            stroke="rgba(0,255,180,0.08)" stroke-width="3" />
                        <polyline points="8,22 11,22 13,15 16,29 18,19 20,24 22,15 25,29 27,19 29,22 32,22" stroke="#00ffb4"
                            stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <span class="logo-text">ECHO<span class="logo-accent">AI</span></span>
            </div>
            <div class="status-dot" id="statusDot" title="Idle"></div>
        </div>

        <!-- URL Bar -->
        <div class="url-bar">
            <div class="url-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07L11.75 5.93" />
                    <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
                </svg>
            </div>
            <input type="text" id="urlInput" placeholder="Enter or paste a URL…" autocomplete="off" spellcheck="false">
            <button id="clearBtn" class="clear-btn" title="Clear">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>

        <!-- Scan Button -->
        <button id="checkBtn" class="scan-btn">
            <span class="scan-btn-inner">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <circle cx="11" cy="11" r="8" />
                    <path d="M21 21l-4.35-4.35" />
                </svg>
                <span id="btnText">Scan URL</span>
            </span>
            <div class="scan-loader" id="scanLoader"></div>
        </button>

        <!-- Result Panel -->
        <div class="result-panel" id="resultPanel">

            <!-- Idle state -->
            <div class="state-idle" id="stateIdle">
                <div class="idle-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"
                        stroke-linecap="round">
                        <path d="M12 2L4 7v5c0 5.25 3.4 10.15 8 11.35C16.6 22.15 20 17.25 20 12V7L12 2z" />
                    </svg>
                </div>
                <p class="idle-text">Paste a URL above and scan to check if it's safe</p>
            </div>

            <!-- Loading state -->
            <div class="state-loading hidden" id="stateLoading">
                <div class="loading-bars">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <p class="loading-text">Analyzing URL…</p>
            </div>

            <!-- Result state -->
            <div class="state-result hidden" id="stateResult">

                <!-- Verdict Banner -->
                <div class="verdict" id="verdict">
                    <div class="verdict-icon" id="verdictIcon"></div>
                    <div class="verdict-info">
                        <span class="verdict-label" id="verdictLabel">SAFE</span>
                        <span class="verdict-sublabel" id="verdictSublabel">No threats detected</span>
                    </div>
                    <div class="confidence-badge" id="confidenceBadge">98%</div>
                </div>

                <!-- Gauge -->
                <div class="gauge-wrap">
                    <div class="gauge-track">
                        <div class="gauge-fill" id="gaugeFill"></div>
                    </div>
                    <div class="gauge-labels">
                        <span>Safe</span><span>Suspicious</span><span>Phishing</span>
                    </div>
                </div>

                <!-- Risk Level -->
                <div class="risk-row">
                    <span class="risk-label">Risk level</span>
                    <span class="risk-pill" id="riskPill">Low</span>
                </div>

                <!-- Divider -->
                <div class="divider"></div>

                <!-- Reasons -->
                <div class="reasons-section">
                    <p class="section-title">Detection signals</p>
                    <ul class="reasons-list" id="reasonsList"></ul>
                </div>

                <!-- Action buttons -->
                <div class="action-row" id="actionRow"></div>

            </div>

            <!-- Error state -->
            <div class="state-error hidden" id="stateError">
                <div class="error-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <circle cx="12" cy="16" r="0.5" fill="currentColor" stroke="none" />
                    </svg>
                </div>
                <p class="error-title" id="errorTitle">Connection failed</p>
                <p class="error-sub" id="errorSub">Make sure the backend is running on port 8000</p>
            </div>

        </div>

        <!-- Footer -->
        <div class="footer">
            <span>Powered by RandomForest + ML backend</span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
